<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow: hidden;
  text-align: center;
}

/* STAR BACKGROUND */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
}

.stars span {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  0%,100% {opacity:0.2;}
  50% {opacity:1;}
}

/* LOADING */
#loading {
  position: absolute;
  top: 40%;
  width: 100%;
}

.loader {
  border: 5px solid #333;
  border-top: 5px solid pink;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  margin: auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* CONTENT */
#content {
  display: none;
  padding-top: 50px;
}

/* TITLE */
h1 {
  font-size: 24px;
}

/* LOVE EFFECT */
.love {
  position: fixed;
  color: pink;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}

/* GALLERY */
.gallery img {
  width: 80px;
  border-radius: 10px;
  position: absolute;
  animation: floatImg 10s linear infinite;
}

@keyframes floatImg {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}

/* BOX MESSAGE */
.box {
  margin-top: 30px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  box-shadow: 0 0 20px pink;
  display: inline-block;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px pink; }
  to { box-shadow: 0 0 30px red; }
}

/* BUTTON */
button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: pink;
  color: black;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <p>Loading... Lagi bikin galaxy 🚀</p>
</div>

<!-- CONTENT -->
<div id="content">
  <h1>Only For You 💖</h1>

  <!-- GALLERY -->
  <div class="gallery">
    <img src="img/1.jpg" style="left:10%">
    <img src="img/2.jpg" style="left:50%">
    <img src="img/3.jpg" style="left:80%">
  </div>

  <!-- BOX MESSAGE -->
  <div class="box">
    <p>Kamu sayang aku nggak? 😳</p>
    <button onclick="jawab('iya')">Iya ❤️</button>
    <button onclick="jawab('tidak')">Tidak 😢</button>
  </div>

  <p id="hasil"></p>
</div>

<script>
// GENERATE STARS
for(let i=0;i<100;i++){
  let star = document.createElement("span");
  star.style.top = Math.random()*100 + "%";
  star.style.left = Math.random()*100 + "%";
  document.getElementById("stars").appendChild(star);
}

// LOVE EFFECT
setInterval(()=>{
  let love = document.createElement("div");
  love.className = "love";
  love.innerHTML = "❤️";
  love.style.left = Math.random()*100 + "%";
  document.body.appendChild(love);

  setTimeout(()=>love.remove(),5000);
},500);

// LOADING DELAY
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("content").style.display="block";
},3000);

// BUTTON FUNCTION
function jawab(j){
  if(j=="iya"){
    document.getElementById("hasil").innerHTML="Aww makasih ❤️";
  } else {
    document.getElementById("hasil").innerHTML="Yahh 😭 coba pilih lagi dong";
  }
}
</script>

</body>
</html>
